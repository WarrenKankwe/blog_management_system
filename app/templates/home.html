{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
<h1>Published Posts</h1>
{% for p in posts %}
  <article>
    <h2><a href="{{ url_for('posts.post_detail', post_id=p.id) }}">{{ p.title }}</a></h2>
    <small>by {{ p.author.username }} on {{ p.date_posted.strftime('%Y-%m-%d') }}</small>
  </article>
{% else %}
  <p>No posts yet.</p>
{% endfor %}
{% endblock %}
