{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="POST">
  {{ form.hidden_tag() }}
  <p>{{ form.email.label }} {{ form.email(size=32) }}</p>
  <p>{{ form.password.label }} {{ form.password(size=32) }}</p>
  {{ form.submit(class="btn") }}
</form>
{% endblock %}
